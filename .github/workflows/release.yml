name: release

# DISABLED until the public API stabilizes (planned for v1.0).
# To enable: remove the `if: false` line below and add a PYPI_API_TOKEN repo secret,
# then trigger via the Actions tab → release → Run workflow.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v0.2.0)"
        required: true

jobs:
  publish:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install twine
          python -m twine upload dist/*
